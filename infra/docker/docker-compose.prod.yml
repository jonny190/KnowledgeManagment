services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kmgmt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: kmgmt
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmgmt -d kmgmt"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: ${WEB_IMAGE:-ghcr.io/jonny/kmgmt-web:latest}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://kmgmt:${POSTGRES_PASSWORD}@postgres:5432/kmgmt
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      DATA_DIR: /data
      REALTIME_JWT_SECRET: ${REALTIME_JWT_SECRET}
      NEXT_PUBLIC_REALTIME_URL: ${NEXT_PUBLIC_REALTIME_URL}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      GRAPH_TENANT_ID: ${GRAPH_TENANT_ID:-}
      GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID:-}
      GRAPH_CLIENT_SECRET: ${GRAPH_CLIENT_SECRET:-}
      EMAIL_FROM_MAILBOX: ${EMAIL_FROM_MAILBOX:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-}
      APP_URL: ${APP_URL:-}
      REALTIME_ADMIN_SECRET: ${REALTIME_ADMIN_SECRET}
      REALTIME_INTERNAL_URL: ${REALTIME_INTERNAL_URL}
    volumes:
      - appdata:/data
    ports:
      - "3000:3000"

  worker:
    image: ${WORKER_IMAGE:-ghcr.io/jonny/kmgmt-worker:latest}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://kmgmt:${POSTGRES_PASSWORD}@postgres:5432/kmgmt
      DATA_DIR: /data
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      GRAPH_TENANT_ID: ${GRAPH_TENANT_ID:-}
      GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID:-}
      GRAPH_CLIENT_SECRET: ${GRAPH_CLIENT_SECRET:-}
      EMAIL_FROM_MAILBOX: ${EMAIL_FROM_MAILBOX:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-}
      APP_URL: ${APP_URL:-}
    volumes:
      - appdata:/data

  realtime:
    image: ${REALTIME_IMAGE:-ghcr.io/jonny/km-realtime:latest}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.realtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://kmgmt:${POSTGRES_PASSWORD}@postgres:5432/kmgmt
      REALTIME_JWT_SECRET: ${REALTIME_JWT_SECRET}
      REALTIME_ADMIN_SECRET: ${REALTIME_ADMIN_SECRET}
      REALTIME_PORT: 3001
    ports:
      - "3001:3001"

volumes:
  pgdata:
  appdata:
