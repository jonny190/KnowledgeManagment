name: E2E

on:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: km
          POSTGRES_PASSWORD: km
          POSTGRES_DB: km_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U km -d km_e2e"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
    env:
      DATABASE_URL: postgres://km:km@localhost:5432/km_e2e
      NEXTAUTH_SECRET: e2e-secret
      NEXTAUTH_URL: http://localhost:3000
      DATA_DIR: /tmp/km-e2e
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @km/db prisma migrate deploy
      - run: pnpm --filter @km/web build
      - run: pnpm --filter @km/web exec playwright install --with-deps chromium
      - run: pnpm --filter @km/web exec dotenv -e ../../.env -- playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report
